name: X Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *' # Runs automatically every day at 1:00 PM UTC (7:00 PM BST)

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
    - name: Post Checkout Code Repository
      uses: actions/checkout@v4

    - name: Post Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Generate AI Post & Publish to X
      env:
        PREMIUM_API_KEY: ${{ secrets.PREMIUM_API_KEY }}
        X_COOKIES: ${{ secrets.X_COOKIES }}
        X_HEADLESS: 'true'
      run: python x_automation.py
      
